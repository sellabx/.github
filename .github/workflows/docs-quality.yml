name: docs-quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".github/workflows/docs-quality.yml"
      - "ISSUE_TEMPLATE/config.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - ".github/workflows/docs-quality.yml"
      - "ISSUE_TEMPLATE/config.yml"

permissions:
  contents: read

jobs:
  markdown-and-links:
    name: markdown and link checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            **/*.mdx

      - name: Link Check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,429
            "**/*.md"
            "**/*.mdx"
          fail: true
